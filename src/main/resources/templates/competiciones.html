<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>🏆 Competiciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); }
        .navbar { background: rgba(0,0,0,0.9); }
        .table-card { background: white; border-radius: 20px; overflow: hidden; }
        .btn-floating { position: fixed; bottom: 30px; right: 30px; width: 55px; height: 55px; border-radius: 50%; background: #ffc107; color: black; text-align: center; line-height: 55px; font-size: 24px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="fas fa-futbol"></i> Fútbol App</a>
        <div class="d-flex gap-2">
            <a href="/" class="btn btn-outline-light btn-sm">Inicio</a>
            <a href="/clubes" class="btn btn-outline-light btn-sm">Clubes</a>
            <a href="/entrenadores" class="btn btn-outline-light btn-sm">Entrenadores</a>
            <a href="/jugadores" class="btn btn-outline-light btn-sm">Jugadores</a>
            <a href="/asociaciones" class="btn btn-outline-light btn-sm">Asociaciones</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="table-card">
        <div class="bg-warning p-3">
            <h4 class="mb-0"><i class="fas fa-trophy"></i> Competiciones</h4>
        </div>
        <div class="p-3">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Monto Premio</th>
                        <th>Fecha Inicio</th>
                        <th>Fecha Fin</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${competiciones.empty}">
                        <td colspan="6" class="text-center">No hay competiciones registradas</td>
                    </tr>
                    <tr th:each="c : ${competiciones}">
                        <td th:text="${c.id}"></td>
                        <td><strong th:text="${c.nombre}"></strong></td>
                        <td><span class="badge bg-warning">$ <span th:text="${c.montoPremio}"></span></span></td>
                        <td th:text="${c.fechaInicio}"></td>
                        <td th:text="${c.fechaFin}"></td>
                        <td>
                            <a th:href="@{/competicion/editar/{id}(id=${c.id})}" class="btn btn-primary btn-sm"><i class="fas fa-edit"></i></a>
                            <a th:href="@{/competicion/eliminar/{id}(id=${c.id})}" class="btn btn-danger btn-sm" onclick="return confirm('¿Eliminar esta competición?')"><i class="fas fa-trash"></i></a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<a href="/competicion/nuevo" class="btn-floating"><i class="fas fa-plus"></i></a>

</body>
</html>
