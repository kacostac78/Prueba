<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${asociacion.id != null} ? 'Editar Asociación' : 'Nueva Asociación'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); }
        .form-card { max-width: 550px; margin: 50px auto; background: white; border-radius: 20px; overflow: hidden; }
    </style>
</head>
<body>
<div class="container">
    <div class="form-card">
        <div class="bg-info text-white p-3">
            <h4 class="mb-0"><i class="fas fa-building"></i> <span th:text="${asociacion.id != null} ? 'Editar Asociación' : 'Nueva Asociación'"></span></h4>
        </div>
        <div class="p-4">
            <form action="/asociacion/guardar" method="post" th:object="${asociacion}">
                <input type="hidden" th:field="*{id}"/>
                <div class="mb-3"><label>Nombre</label><input type="text" class="form-control" th:field="*{nombre}" required></div>
                <div class="mb-3"><label>País</label><input type="text" class="form-control" th:field="*{pais}" required></div>
                <div class="mb-3"><label>Presidente</label><input type="text" class="form-control" th:field="*{presidente}" required></div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-info">💾 Guardar</button>
                    <a href="/asociaciones" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
