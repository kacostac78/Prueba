<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Entrenador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); }
        .form-card { max-width: 500px; margin: 50px auto; background: white; border-radius: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="form-card">
        <div class="bg-primary text-white p-3"><h4 class="mb-0"><i class="fas fa-chalkboard-user"></i> Entrenador</h4></div>
        <div class="p-4">
            <form action="/entrenador/guardar" method="post" th:object="${entrenador}">
                <input type="hidden" th:field="*{id}"/>
                <div class="mb-3"><label>Nombre</label><input type="text" class="form-control" th:field="*{nombre}" required></div>
                <div class="mb-3"><label>Apellido</label><input type="text" class="form-control" th:field="*{apellido}" required></div>
                <div class="mb-3"><label>Edad</label><input type="number" class="form-control" th:field="*{edad}" required></div>
                <div class="mb-3"><label>Nacionalidad</label><input type="text" class="form-control" th:field="*{nacionalidad}" required></div>
                <button type="submit" class="btn btn-primary">Guardar</button>
                <a href="/entrenadores" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
