<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>⚽ Lista de Clubes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); }
        .navbar { background: rgba(0,0,0,0.9); }
        .table-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .btn-floating { position: fixed; bottom: 30px; right: 30px; width: 55px; height: 55px; border-radius: 50%; background: #c31432; color: white; text-align: center; line-height: 55px; font-size: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="fas fa-futbol"></i> Fútbol App</a>
        <div>
            <a href="/" class="btn btn-outline-light btn-sm">Inicio</a>
            <a href="/club/nuevo" class="btn btn-danger btn-sm">Nuevo Club</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="table-card">
        <div class="bg-danger text-white p-3">
            <h4 class="mb-0"><i class="fas fa-list"></i> Lista de Clubes de Fútbol</h4>
        </div>
        <div class="p-3">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr><th>ID</th><th>Nombre</th><th>Ciudad</th><th>Año</th><th>Entrenador</th><th>Acciones</th></tr>
                </thead>
                <tbody>
                    <tr th:if="${clubes.empty}"><td colspan="6" class="text-center">No hay clubes registrados</td></tr>
                    <tr th:each="club : ${clubes}">
                        <td th:text="${club.id}"></td>
                        <td><strong th:text="${club.nombre}"></strong></td>
                        <td th:text="${club.ciudad}"></td>
                        <td th:text="${club.anioFundacion}"></td>
                        <td th:text="${club.entrenador != null ? club.entrenador.nombre + ' ' + club.entrenador.apellido : 'Sin asignar'}"></td>
                        <td>
                            <a th:href="@{/club/editar/{id}(id=${club.id})}" class="btn btn-primary btn-sm"><i class="fas fa-edit"></i></a>
                            <a th:href="@{/club/eliminar/{id}(id=${club.id})}" class="btn btn-danger btn-sm" onclick="return confirm('¿Eliminar?')"><i class="fas fa-trash"></i></a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<a href="/club/nuevo" class="btn-floating"><i class="fas fa-plus"></i></a>

</body>
</html>
