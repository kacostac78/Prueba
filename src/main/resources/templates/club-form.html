<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${club.id != null} ? 'Editar Club' : 'Nuevo Club'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); }
        .form-card { max-width: 700px; margin: 40px auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="container">
    <div class="form-card">
        <div class="bg-danger text-white p-3">
            <h4 class="mb-0"><i class="fas" th:classappend="${club.id != null} ? 'fa-edit' : 'fa-plus-circle'"></i> <span th:text="${club.id != null} ? 'Editar Club' : 'Nuevo Club'"></span></h4>
        </div>
        <div class="p-4">
            <form action="/club/guardar" method="post" th:object="${club}">
                <input type="hidden" th:field="*{id}"/>
                
                <div class="mb-3">
                    <label class="form-label">Nombre del Club</label>
                    <input type="text" class="form-control" th:field="*{nombre}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Ciudad</label>
                    <input type="text" class="form-control" th:field="*{ciudad}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Año de Fundación</label>
                    <input type="number" class="form-control" th:field="*{anioFundacion}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Entrenador (OneToOne)</label>
                    <select class="form-control" name="entrenadorId">
                        <option value="">-- Seleccione --</option>
                        <option th:each="e : ${entrenadores}" th:value="${e.id}" th:text="${e.nombre + ' ' + e.apellido}" th:selected="${club.entrenador != null and club.entrenador.id == e.id}"></option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Asociación (ManyToOne)</label>
                    <select class="form-control" name="asociacionId">
                        <option value="">-- Seleccione --</option>
                        <option th:each="a : ${asociaciones}" th:value="${a.id}" th:text="${a.nombre}" th:selected="${club.asociacion != null and club.asociacion.id == a.id}"></option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Competiciones (ManyToMany)</label>
                    <select class="form-control" name="competicionesIds" multiple size="4">
                        <option th:each="c : ${competiciones}" th:value="${c.id}" th:text="${c.nombre}" th:selected="${club.competiciones != null and club.competiciones.contains(c)}"></option>
                    </select>
                    <small class="text-muted">Ctrl + click para seleccionar múltiples</small>
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger">💾 Guardar</button>
                    <a href="/clubes" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
