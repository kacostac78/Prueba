<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>👤 Entrenadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); }
        .navbar { background: rgba(0,0,0,0.9); }
        .table-card { background: white; border-radius: 20px; overflow: hidden; }
        .btn-floating { position: fixed; bottom: 30px; right: 30px; width: 55px; height: 55px; border-radius: 50%; background: #007bff; color: white; text-align: center; line-height: 55px; font-size: 24px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="fas fa-futbol"></i> Fútbol App</a>
        <a href="/" class="btn btn-outline-light btn-sm">Inicio</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="table-card">
        <div class="bg-primary text-white p-3">
            <h4 class="mb-0"><i class="fas fa-chalkboard-user"></i> Entrenadores</h4>
        </div>
        <div class="p-3">
            <table class="table table-hover">
                <thead class="table-dark"><tr><th>ID</th><th>Nombre</th><th>Apellido</th><th>Edad</th><th>Nacionalidad</th><th>Acciones</th></tr></thead>
                <tbody>
                    <tr th:if="${entrenadores.empty}"><td colspan="6" class="text-center">No hay entrenadores</td></tr>
                    <tr th:each="e : ${entrenadores}">
                        <td th:text="${e.id}"></td><td th:text="${e.nombre}"></td><td th:text="${e.apellido}"></td><td th:text="${e.edad}"></td><td th:text="${e.nacionalidad}"></td>
                        <td>
                            <a th:href="@{/entrenador/editar/{id}(id=${e.id})}" class="btn btn-primary btn-sm"><i class="fas fa-edit"></i></a>
                            <a th:href="@{/entrenador/eliminar/{id}(id=${e.id})}" class="btn btn-danger btn-sm" onclick="return confirm('¿Eliminar?')"><i class="fas fa-trash"></i></a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<a href="/entrenador/nuevo" class="btn-floating"><i class="fas fa-plus"></i></a>

</body>
</html>
