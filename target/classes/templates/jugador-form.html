<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${jugador.id != null} ? 'Editar Jugador' : 'Nuevo Jugador'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); }
        .form-card { max-width: 600px; margin: 50px auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .bg-gradient-green { background: linear-gradient(135deg, #28a745, #20c997); }
    </style>
</head>
<body>

<div class="container">
    <div class="form-card">
        <div class="bg-gradient-green text-white p-3">
            <h4 class="mb-0">
                <i class="fas" th:classappend="${jugador.id != null} ? 'fa-edit' : 'fa-plus-circle'"></i>
                <span th:text="${jugador.id != null} ? 'Editar Jugador' : 'Nuevo Jugador'"></span>
            </h4>
        </div>
        <div class="p-4">
            <form action="/jugador/guardar" method="post" th:object="${jugador}">
                <input type="hidden" th:field="*{id}"/>
                
                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control" th:field="*{nombre}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Apellido</label>
                    <input type="text" class="form-control" th:field="*{apellido}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Número de Camiseta</label>
                    <input type="number" class="form-control" th:field="*{numero}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Posición</label>
                    <select class="form-control" th:field="*{posicion}" required>
                        <option value="">Seleccione...</option>
                        <option value="Portero">🧤 Portero</option>
                        <option value="Defensa">🛡️ Defensa</option>
                        <option value="Volante">⚡ Volante</option>
                        <option value="Delantero">🎯 Delantero</option>
                    </select>
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">💾 Guardar</button>
                    <a href="/jugadores" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
