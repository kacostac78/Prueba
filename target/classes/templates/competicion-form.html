<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${competicion.id != null} ? 'Editar Competición' : 'Nueva Competición'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); }
        .form-card { max-width: 600px; margin: 50px auto; background: white; border-radius: 20px; overflow: hidden; }
    </style>
</head>
<body>
<div class="container">
    <div class="form-card">
        <div class="bg-warning p-3">
            <h4 class="mb-0"><i class="fas fa-trophy"></i> <span th:text="${competicion.id != null} ? 'Editar Competición' : 'Nueva Competición'"></span></h4>
        </div>
        <div class="p-4">
            <form action="/competicion/guardar" method="post" th:object="${competicion}">
                <input type="hidden" th:field="*{id}"/>
                <div class="mb-3"><label>Nombre</label><input type="text" class="form-control" th:field="*{nombre}" required></div>
                <div class="mb-3"><label>Monto del Premio ($)</label><input type="number" class="form-control" th:field="*{montoPremio}" required></div>
                <div class="mb-3"><label>Fecha de Inicio</label><input type="date" class="form-control" th:field="*{fechaInicio}" required></div>
                <div class="mb-3"><label>Fecha de Fin</label><input type="date" class="form-control" th:field="*{fechaFin}" required></div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-warning">💾 Guardar</button>
                    <a href="/competiciones" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
