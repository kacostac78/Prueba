<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>⚽ Jugadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        .table-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .btn-floating { position: fixed; bottom: 30px; right: 30px; width: 55px; height: 55px; border-radius: 50%; background: #28a745; color: white; text-align: center; line-height: 55px; font-size: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: all 0.3s; z-index: 1000; }
        .btn-floating:hover { transform: scale(1.1); background: #2ecc71; color: white; }
        .badge-pos { background: #28a745; color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="fas fa-futbol"></i> <strong>Fútbol App</strong>
        </a>
        <div class="d-flex gap-2">
            <a href="/" class="btn btn-outline-light btn-sm">Inicio</a>
            <a href="/clubes" class="btn btn-outline-light btn-sm">Clubes</a>
            <a href="/entrenadores" class="btn btn-outline-light btn-sm">Entrenadores</a>
            <a href="/asociaciones" class="btn btn-outline-light btn-sm">Asociaciones</a>
            <a href="/competiciones" class="btn btn-outline-light btn-sm">Competiciones</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="table-card">
        <div class="bg-success text-white p-3">
            <h4 class="mb-0"><i class="fas fa-shirt"></i> Lista de Jugadores</h4>
        </div>
        <div class="p-3">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Número</th>
                        <th>Posición</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${jugadores.empty}">
                        <td colspan="6" class="text-center">No hay jugadores registrados</td>
                    </tr>
                    <tr th:each="j : ${jugadores}">
                        <td th:text="${j.id}"></td>
                        <td><strong th:text="${j.nombre}"></strong></td>
                        <td th:text="${j.apellido}"></td>
                        <td><span class="badge bg-dark" th:text="${j.numero}"></span></td>
                        <td><span class="badge-pos" th:text="${j.posicion}"></span></td>
                        <td>
                            <a th:href="@{/jugador/editar/{id}(id=${j.id})}" class="btn btn-primary btn-sm">
                                <i class="fas fa-edit"></i>
                            </a>
                            <a th:href="@{/jugador/eliminar/{id}(id=${j.id})}" class="btn btn-danger btn-sm" 
                               onclick="return confirm('¿Eliminar este jugador?')">
                                <i class="fas fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<a href="/jugador/nuevo" class="btn-floating">
    <i class="fas fa-plus"></i>
</a>

</body>
</html>
